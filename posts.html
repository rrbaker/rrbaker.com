---
layout: default
title: Blog
---

<div id="main">
  {% for post in site.posts limit:100%}
  <header class="major">
    <h2><a href="{{post.url}}">{{ post.title }}</a></h2>
    <p class="post-meta">{{ post.date | date: "%b %-d, %Y" }}{% if page.meta %} • {{ page.meta }}{% endif %}</p>
  </header>

  <p>
    {{ post.excerpt }}
  </p>

  {% endfor %}
</div>
