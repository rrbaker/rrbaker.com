---
layout: default
title: Blog
---

<div id="main">
  {% for post in site.posts %}
  <header class="major">
    <h2>
      {% if post.medium_url %}
      <a href="{{post.medium_url}}">
      {% else %}
      <a href="{{post.url}}">
      {% endif %}
      {{ post.title }}
      </a>
    </h2>
    <h3>{{ post.excerpt }}</h3>
    <small>{{ post.date | date: "%-d %b %Y" }}</small>
  </header>
  {% endfor %}
</div>
