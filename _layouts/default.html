      </li>

        </a>

      <li>
        <a href="https://github.com/{{ site.social_username }}" class="icon fa-github">

        <a href="https://linkedin.com/in/{{ site.social_username }}" class="icon fa-linkedin">

        </a>

        <a href="mailto:{{ site.email }}" class="icon fa-envelope-o">
          <span class="label">Email</span>
        </a>
      </li>
